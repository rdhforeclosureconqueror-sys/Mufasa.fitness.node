<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Trainer Workspace</title><link rel="stylesheet" href="trainer.css"></head>
<body><header><div><strong>Mufasa Fitness</strong><h1>Trainer Workspace</h1></div><nav aria-label="Workspace"><a href="/dashboard.html">My Member Home</a></nav></header>
<main><section class="panel"><form id="filters"><label>Search <input name="search" type="search" placeholder="Client name"></label><label>Intake <select name="intakeStatus"><option value="">All</option><option>complete</option><option>incomplete</option></select></label><label>Health review <select name="healthReviewStatus"><option value="">All</option><option>clear</option><option>required</option></select></label><label>Program <select name="programStatus"><option value="">All</option><option>trainer_assigned</option><option>member_selected</option><option>generated</option><option>none</option></select></label><button>Apply</button></form><p id="status" role="status">Loading assigned clients…</p><div id="clients" class="cards"></div></section>
<section id="detail" class="panel" hidden tabindex="-1"><h2 id="client-name"></h2><div id="overview"></div><h3>Assign program</h3><form id="program"><label for="program-id">Program ID</label><input id="program-id" name="programId" required maxlength="128"><label for="program-title">Program title</label><input id="program-title" name="title" required maxlength="200"><button>Save program</button></form><h3>Private trainer notes</h3><div id="notes"></div><form id="note"><label for="note-body">Private note</label><textarea id="note-body" name="body" required maxlength="4000"></textarea><button>Add note</button></form></section></main><script src="trainer.js"></script></body></html>
